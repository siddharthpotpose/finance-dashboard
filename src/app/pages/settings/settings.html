<section class="page-section">
  <div class="section-header">
    <div>
      <h2>Settings</h2>
      <p>Configure currency, tax, and preferences</p>
    </div>
  </div>

  <div class="settings-grid">
    <div class="card">
      <div class="card-header">
        <i class="fa-solid fa-coins"></i>
        <h3>Currency & Tax</h3>
      </div>
      <form class="settings-form" [formGroup]="settingsForm">
        <div class="form-group">
          <label>Currency</label>
          <select formControlName="currency">
            <option value="USD">USD - US Dollar</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="INR">INR - Indian Rupee</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tax Rate (%)</label>
          <input type="number" formControlName="taxRate" />
        </div>
      </form>
    </div>

    <div class="card">
      <div class="card-header">
        <i class="fa-solid fa-calendar"></i>
        <h3>Fiscal Settings</h3>
      </div>
      <form class="settings-form" [formGroup]="settingsForm">
        <div class="form-group">
          <label>Fiscal Year</label>
          <input type="text" formControlName="fiscalYear" />
        </div>
        <div class="form-group">
          <label>Primary Category</label>
          <input type="text" formControlName="baseCategory" />
        </div>
      </form>
    </div>

    <div class="card">
      <div class="card-header">
        <i class="fa-solid fa-database"></i>
        <h3>Data Management</h3>
      </div>
      <div class="data-actions">
        <button class="btn-action" type="button">
          <i class="fa-solid fa-download"></i>
          Export All Data
        </button>
        <button class="btn-action" type="button">
          <i class="fa-solid fa-upload"></i>
          Import Data
        </button>
        <button class="btn-action danger" type="button">
          <i class="fa-solid fa-trash"></i>
          Clear Local Storage
        </button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <i class="fa-solid fa-user-shield"></i>
        <h3>Current Settings</h3>
      </div>
      <div class="current-settings">
        <div class="setting-row">
          <span class="setting-label">Currency</span>
          <span class="setting-value">{{ settings().currency }}</span>
        </div>
        <div class="setting-row">
          <span class="setting-label">Tax Rate</span>
          <span class="setting-value">{{ settings().taxRate }}%</span>
        </div>
        <div class="setting-row">
          <span class="setting-label">Fiscal Year</span>
          <span class="setting-value">{{ settings().fiscalYear }}</span>
        </div>
        <div class="setting-row">
          <span class="setting-label">Primary Category</span>
          <span class="setting-value">{{ settings().baseCategory }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
