<section class="page-section">
  <div class="section-header">
    <div>
      <h2>Alerts</h2>
      <p>System notifications and warnings</p>
    </div>
  </div>

  <!-- Alert Summary -->
  <div class="alert-summary">
    <div class="alert-stat high">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span class="stat-num">{{ highCount }}</span>
      <span class="stat-label">High</span>
    </div>
    <div class="alert-stat medium">
      <i class="fa-solid fa-triangle-exclamation"></i>
      <span class="stat-num">{{ mediumCount }}</span>
      <span class="stat-label">Medium</span>
    </div>
    <div class="alert-stat low">
      <i class="fa-solid fa-circle-info"></i>
      <span class="stat-num">{{ lowCount }}</span>
      <span class="stat-label">Low</span>
    </div>
  </div>

  <!-- Alert List -->
  <div class="alert-list">
    @for (alert of alerts; track alert.message) {
      <div class="alert-item" [class.high]="alert.level === 'high'" [class.medium]="alert.level === 'medium'" [class.low]="alert.level === 'low'">
        <div class="alert-icon">
          <i class="fa-solid" [ngClass]="alert.level === 'high' ? 'fa-circle-exclamation' : alert.level === 'medium' ? 'fa-triangle-exclamation' : 'fa-circle-info'"></i>
        </div>
        <div class="alert-content">
          <div class="alert-message">{{ alert.message }}</div>
          <div class="alert-time">{{ alert.time }}</div>
        </div>
        <span class="alert-level" [class.high]="alert.level === 'high'" [class.medium]="alert.level === 'medium'" [class.low]="alert.level === 'low'">
          {{ alert.level }}
        </span>
      </div>
    }
  </div>
</section>
